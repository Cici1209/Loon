name: 社交服务合集
description: 包含Discor,WhatsApp,Pinterest,Twitter,Instagram,Facebook,Talkatone
dns:
  forward:
  - proxy_rule_set:
    name: Discord
    match: https://rule.kelee.one/Loon/Discord.lsr

  - proxy_rule_set:
    name: WhatsApp
    match: https://rule.kelee.one/Loon/Whatsapp.lsr

  - proxy_rule_set:
    name: Pinterest
    match: https://rule.kelee.one/Loon/Pinterest.lsr

  - proxy_rule_set:
    name: Twitter/X
    match: https://rule.kelee.one/Loon/Twitter.lsr

  - proxy_rule_set:
    name: Instagram
    match: https://rule.kelee.one/Loon/Instagram.lsr

  - proxy_rule_set:
    name: Facebook
    match: https://rule.kelee.one/Loon/Facebook.lsr

  - proxy_rule_set:
    name: Talkatone
    match: https://raw.githubusercontent.com/TimKerry/L-Rule/refs/heads/main/Talkatone.lsr