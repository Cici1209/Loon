ipv6: true
http_port: 3080
socks_port: 3090
allow_external_connections: false
vif_only: true
hide_vpn_icon: false
geoip_db_url: https://github.com/xream/geoip/releases/latest/download/ipinfo.country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
proxy_latency_test_url: http://www.gstatic.com/generate_204
direct_latency_test_url: http://connectivitycheck.platform.hicloud.com/generate_204
compat_route: false
include_all_networks: false
dns:
  upstreams:
    AI:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
    谷歌:
    - https://dns.google/dns-query
    苹果:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    字节:
    - 180.184.1.1
    - 180.184.2.2
    阿里:
    - https://dns.alidns.com/dns-query
    腾讯:
    - https://doh.pub/dns-query
    国内:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    国外:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Cici1209/Loon/refs/heads/main/ASH.lsr
      value: 国内
      disabled: false
  - proxy_rule_set:
      match: https://kelee.one/Tool/Loon/Lsr/AI.lsr
      value: AI
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/YouTube.lsr
      value: 谷歌
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Google.lsr
      value: 谷歌
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Apple.lsr
      value: 苹果
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/ByteDance.lsr
      value: 字节
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Alibaba.lsr
      value: 阿里
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Tencent.lsr
      value: 腾讯
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Global.lsr
      value: 国外
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/Direct.lsr
      value: 国内
      disabled: false
  - proxy_rule_set:
      match: https://rule.kelee.one/Loon/ChinaMax.lsr
      value: 国内
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 国外
      disabled: false
  hosts:
    iosapps.itunes.apple.com:
    - iosapps.itunes.apple.com.download.ks-cdn.com
  public_ip_lookup_url: https://ifconfig.me/ip
bypass_tunnel_proxy:
- '*.crbank.com.cn'
